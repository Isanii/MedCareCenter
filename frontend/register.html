<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        Đăng ký
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div
        class="card mx-auto"
        style="max-width:500px">

        <div class="card-body">

            <h3 class="text-center mb-4">
                Đăng ký tài khoản
            </h3>

            <div class="mb-3">

                <label>
                    Họ và tên
                </label>

                <input
                    id="fullname"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>
                    Email
                </label>

                <input
                    id="email"
                    type="email"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>
                    Số điện thoại
                </label>

                <input
                    id="phone"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>
                    Mật khẩu
                </label>

                <input
                    id="password"
                    type="password"
                    class="form-control">

            </div>

            <button
                class="btn btn-primary w-100"
                onclick="register()">

                Đăng ký

            </button>

            <div
                id="message"
                class="alert alert-danger mt-3 d-none">
            </div>

            <div
                class="text-center mt-3">

                <a href="login.html">

                    Đã có tài khoản?
                    Đăng nhập

                </a>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>

</body>
</html>
