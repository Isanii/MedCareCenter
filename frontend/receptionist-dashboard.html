<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        Receptionist Dashboard
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">

        MedCare

    </div>

    <a
        href="receptionist-dashboard.html"
        class="active">

        Dashboard

    </a>

    <a href="patients.html">

        Bệnh nhân

    </a>

    <a href="appointments.html">

        Lịch hẹn

    </a>

    <a href="invoices.html">

        Hóa đơn

    </a>

    <a
        href="#"
        id="logoutBtn">

        Logout

    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <h3>

            Dashboard Lễ tân

        </h3>

    </div>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Tổng bệnh nhân
                    </h6>

                    <div
                        id="patientCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Lịch hôm nay
                    </h6>

                    <div
                        id="todayAppointmentCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Chờ xác nhận
                    </h6>

                    <div
                        id="pendingAppointmentCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Hóa đơn
                    </h6>

                    <div
                        id="invoiceCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

    </div>


    <div class="row mt-4">

        <div class="col-md-6">

            <div class="card">

                <div class="card-header">

                    Chức năng lễ tân

                </div>

                <div class="card-body">

                    <ul>

                        <li>
                            Tiếp nhận bệnh nhân
                        </li>

                        <li>
                            Quản lý lịch hẹn
                        </li>

                        <li>
                            Xác nhận lịch khám
                        </li>

                        <li>
                            Quản lý hóa đơn
                        </li>

                    </ul>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card">

                <div class="card-header">

                    Thông tin tài khoản

                </div>

                <div
                    class="card-body"
                    id="userInfo">

                    Đang tải...

                </div>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>

<script src="assets/js/guard.js"></script>

<script src="assets/js/role-guard.js"></script>

<script src="assets/js/receptionist-dashboard.js"></script>

</body>

</html>
