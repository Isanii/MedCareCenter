<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        Doctor Dashboard
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">
        MedCare
    </div>

    <a
        href="doctor-dashboard.html"
        class="active">

        Dashboard

    </a>

    <a href="doctor-appointments.html">

        Lịch khám

    </a>

    <a href="doctor-medical-records.html">

        Bệnh án

    </a>

    <a
        href="#"
        id="logoutBtn">

        Logout

    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <h3>

            Dashboard Bác sĩ

        </h3>

    </div>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Tổng lịch khám
                    </h6>

                    <div
                        id="appointmentCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Đang chờ khám
                    </h6>

                    <div
                        id="pendingCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Đã hoàn thành
                    </h6>

                    <div
                        id="completedCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card stat-card">

                <div class="card-body">

                    <h6>
                        Bệnh án đã tạo
                    </h6>

                    <div
                        id="recordCount"
                        class="stat-number">

                        0

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/role-guard.js"></script>

<script src="assets/js/doctor-dashboard.js"></script>

</body>
</html>
