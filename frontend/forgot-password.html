<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
Quên mật khẩu
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div
        class="card mx-auto"
        style="max-width:500px">

        <div class="card-body">

            <h3 class="mb-4">
                Quên mật khẩu
            </h3>

            <div class="mb-3">

                <label>Email</label>

                <input
                    id="email"
                    class="form-control">

            </div>

            <button
                class="btn btn-primary mb-3"
                onclick="sendOtp()">

                Gửi OTP

            </button>

            <div class="mb-3">

                <label>OTP</label>

                <input
                    id="otp"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>
                    Mật khẩu mới
                </label>

                <input
                    type="password"
                    id="newPassword"
                    class="form-control">

            </div>

            <button
                class="btn btn-success"
                onclick="resetPassword()">

                Đổi mật khẩu

            </button>

            <div
                id="message"
                class="mt-3">

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/forgot-password.js"></script>

</body>

</html>
