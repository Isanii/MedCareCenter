<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Invoices</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">
        MedCare
    </div>

    <a href="dashboard.html">
        Dashboard
    </a>

    <a href="doctors.html">
        Doctors
    </a>

    <a href="patients.html">
        Patients
    </a>

    <a href="appointments.html">
        Appointments
    </a>

    <a href="medical-records.html">
        Medical Records
    </a>

    <a
        href="invoices.html"
        class="active">

        Invoices

    </a>

    <a
        href="#"
        id="logoutBtn">

        Logout

    </a>

</div>

<div class="main-content">

    <div class="topbar d-flex justify-content-between">

        <h3>
            Quản lý hóa đơn
        </h3>

        <button
            class="btn btn-primary"
            id="addInvoiceBtn">

            Tạo hóa đơn

        </button>

    </div>

    <div class="card">

        <div class="card-body">

            <table
                class="table table-striped">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Appointment</th>

                    <th>Số tiền</th>

                    <th>Trạng thái</th>

                    <th>Ngày tạo</th>

                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody
                    id="invoiceTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<div
    class="modal fade"
    id="invoiceModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Tạo hóa đơn

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form
                    id="invoiceForm">

                    <div class="mb-3">

                        <label>
                            Appointment
                        </label>

                        <select
                            id="appointmentId"
                            class="form-select">

                        </select>

                    </div>

                    <div class="mb-3">

                        <label>
                            Số tiền
                        </label>

                        <input
                            type="number"
                            id="amount"
                            class="form-control">

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Hủy

                </button>

                <button
                    class="btn btn-primary"
                    id="saveInvoiceBtn">

                    Lưu

                </button>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/role-guard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/invoices.js"></script>

</body>
</html>
