<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Doctors</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">
        MedCare
    </div>

    <a href="dashboard.html">
        Dashboard
    </a>

    <a
        href="doctors.html"
        class="active">
        Doctors
    </a>

    <a href="patients.html">
        Patients
    </a>

    <a href="appointments.html">
        Appointments
    </a>
    <a href="medical-records.html">
        Medical Records
    </a>
    <a href="invoices.html">
        Invoices
    </a>

    <a
        href="#"
        id="logoutBtn">
        Logout
    </a>

</div>

<div class="main-content">

    <div class="topbar d-flex justify-content-between">

        <h3>
            Quản lý bác sĩ
        </h3>

        <button
            class="btn btn-primary"
            id="addDoctorBtn">

            Thêm bác sĩ

        </button>

    </div>

    <div class="card">

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-6">

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Tìm bác sĩ...">

                </div>

                <div class="col-md-2">

                    <button
                        class="btn btn-primary w-100"
                        id="searchBtn">

                        Tìm

                    </button>

                </div>

            </div>

            <table
                class="table table-striped">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Chuyên khoa</th>
                    <th>Phòng</th>
                    <th>Kinh nghiệm</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>

                </thead>

                <tbody id="doctorTable">

                </tbody>

            </table>
            <nav class="mt-3">

                <ul
                    class="pagination"
                    id="pagination">

                </ul>

            </nav>
        </div>

    </div>

</div>

<div
    class="modal fade"
    id="doctorModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Thêm bác sĩ

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="doctorForm">

                    <div class="mb-3">

                        <div class="mb-3">

                        <label>Họ tên</label>

                        <input
                            type="text"
                            id="fullname"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Số điện thoại</label>

                        <input
                            type="text"
                            id="phone"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Mật khẩu</label>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            required>

                    </div>

                    </div>

                    <div class="mb-3">

                        <label>Chuyên khoa</label>

                        <input
                            type="text"
                            id="specialty"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Phòng khám</label>

                        <input
                            type="text"
                            id="roomNumber"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Kinh nghiệm</label>

                        <input
                            type="number"
                            id="experience"
                            class="form-control">

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Hủy

                </button>

                <button
                    class="btn btn-primary"
                    id="saveDoctorBtn">

                    Lưu

                </button>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/role-guard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/doctors.js"></script>
</body>
</html>
