<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Patient Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">

        MedCare

    </div>

    <a
        href="patient-dashboard.html"
        class="active">

        Dashboard

    </a>

    <a href="my-appointments.html">

        Lịch hẹn của tôi

    </a>

    <a href="my-medical-records.html">
        Bệnh án của tôi
    </a>

    <a href="my-invoices.html">
        Hóa đơn của tôi
    </a>


    <a href="patient-chat.html">
        Chat với bác sĩ
    </a>
    <a
        href="#"
        id="logoutBtn">

        Logout

    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <h3>

            Dashboard bệnh nhân

        </h3>

    </div>

    <div class="row g-4">

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Tổng lịch hẹn</h6>

                <div
                    id="totalAppointments"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Đang chờ</h6>

                <div
                    id="pendingAppointments"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Hoàn thành</h6>

                <div
                    id="completedAppointments"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Bệnh án</h6>

                <div
                    id="recordCount"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Hóa đơn</h6>

                <div
                    id="invoiceCount"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6>Đã thanh toán</h6>

                <div
                    id="paidInvoiceCount"
                    class="stat-number">

                    0

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script src="assets/js/api.js"></script>

<script src="assets/js/guard.js"></script>
<script src="assets/js/role-guard.js"></script>

<script src="assets/js/patient-dashboard.js"></script>

</body>

</html>
