<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>MedCare Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">

        MedCare

    </div>

    <a href="#">
        Dashboard
    </a>

    <a href="doctors.html">
        Doctors
    </a>

    <a href="patients.html">
        Patients
    </a>

    <a href="appointments.html">
        Appointments
    </a>
    <a href="medical-records.html">
        Medical Records
    </a>
    <a href="invoices.html">
        Invoices
    </a>

    <a
        href="#"
        id="logoutBtn">

        Logout

    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <h3 class="mb-0">

            Dashboard

        </h3>

    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Tổng bác sĩ</h6>
                    <div id="doctorCount" class="stat-number">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Tổng bệnh nhân</h6>
                    <div id="patientCount" class="stat-number">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Tổng lịch hẹn</h6>
                    <div id="appointmentCount" class="stat-number">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Tổng hóa đơn</h6>
                    <div id="invoiceCount" class="stat-number">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Hóa đơn đã thanh toán</h6>
                    <div id="paidInvoiceCount" class="stat-number">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <h6>Tổng doanh thu</h6>
                    <div id="revenueCount" class="stat-number">
                        0 VNĐ
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="card mt-4">

        <div class="card-body">

            <h4>
                Thông tin người dùng
            </h4>

            <div id="userInfo"></div>

        </div>

    </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/guard.js"></script>
<script src="assets/js/role-guard.js"></script>

<script src="assets/js/dashboard.js"></script>

</body>

</html>
